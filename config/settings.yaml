# ── Model Configuration ──
model:
  # Feature engineering
  form_window: 10          # Number of recent innings for form calculation
  form_decay: 0.85         # Exponential decay factor for recency weighting
  h2h_min_matches: 3       # Minimum matches for head-to-head stats to be valid

  # Cross-format weights
  cross_format_weights:
    ipl: 0.40
    international_t20: 0.25
    other_t20_leagues: 0.20
    domestic: 0.15

  # XGBoost hyperparameters
  xgboost:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 3
    reg_alpha: 0.1
    reg_lambda: 1.0

  # LightGBM hyperparameters
  lightgbm:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    num_leaves: 31

  # Ensemble weights
  ensemble:
    xgboost_weight: 0.45
    lightgbm_weight: 0.35
    logistic_weight: 0.20

  # Target accuracy thresholds
  accuracy:
    minimum: 0.60         # Below this = model needs work
    target: 0.65          # Our goal
    excellent: 0.70       # Above this = very good

# ── Live Data Feeds (Phase D) ──
live_feeds:
  cricapi:
    base_url: "https://api.cricapi.com/v1"
    daily_limit: 90          # Free tier: 100/day, leave 10 buffer
    cache_ttl_seconds: 15    # Cache responses for 15s
    poll_interval_seconds: 30 # Poll every 30s during live match
    # API key stored in .env as CRICAPI_KEY

  odds_api:
    base_url: "https://api.the-odds-api.com/v4"
    monthly_limit: 450       # Free tier: 500/month, leave 50 buffer
    cache_ttl_seconds: 3600  # Cache odds for 1 hour
    regions: "eu,uk"
    markets: "h2h"
    sport: "cricket_ipl"
    # API key stored in .env as THE_ODDS_API_KEY

# ── Dashboard Configuration ──
dashboard:
  title: "IPL Prediction AI Agent"
  theme: "dark"
  refresh_interval_seconds: 300  # Auto-refresh every 5 minutes on match days

# ── Automation ──
automation:
  daily_update_time: "06:00"     # UTC time for daily data refresh
  match_day_interval_minutes: 60  # How often to refresh on match days
  retrain_after_match: true       # Automatically retrain after each match result
